{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 4rem auto;">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Connexion</h2>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Se connecter</button>
    </form>
</div>
{% endblock %}
